<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro de Cosecha</title>
    
    <!-- Importamos Bootstrap para que se vea profesional sin escribir CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row">
            
            <!-- SECCIÓN 1: EL FORMULARIO DE CAPTURA -->
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Nuevo Registro</h5>
                    </div>
                    <div class="card-body">
                        
                        <!-- Aquí es donde la magia ocurre: La etiqueta form -->
                        <form id="formulario-registro">
                            
                            <!-- Input para el Nombre -->
                            <div class="mb-3">
                                <label for="input-supervisor" class="form-label">Supervisor</label>
                                <!-- El atributo 'required' obliga al usuario a llenarlo antes de enviar -->
                                <input type="text" class="form-control" id="input-supervisor" placeholder="Ej. J. Mendoza" required>
                            </div>

                            <!-- Input para el Sector -->
                            <div class="mb-3">
                                <label for="input-sector" class="form-label">Sector</label>
                                <select class="form-select" id="input-sector" required>
                                    <option value="" selected disabled>Seleccione una zona...</option>
                                    <option value="Norte">Zona Norte</option>
                                    <option value="Sur">Zona Sur</option>
                                    <option value="Este">Zona Este</option>
                                    <option value="Oeste">Zona Oeste</option>
                                </select>
                            </div>

                            <!-- Input para los Kilos -->
                            <div class="mb-3">
                                <label for="input-kilos" class="form-label">Kilos Recolectados</label>
                                <!-- El type="number" evita que el usuario escriba letras -->
                                <input type="number" class="form-control" id="input-kilos" placeholder="0" min="1" required>
                            </div>

                            <!-- Botón de Envío. El type="submit" es crucial dentro de un form -->
                            <button type="submit" class="btn btn-success w-100">Guardar Datos</button>
                        
                        </form>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN 2: LAS MÉTRICAS Y LA TABLA -->
            <div class="col-md-8">
                
                <!-- Tarjetas de Resumen (Métricas) -->
                <div class="row mb-4">
                    <div class="col-sm-6">
                        <div class="card bg-primary text-white shadow-sm h-100">
                            <div class="card-body text-center">
                                <h6>Total Kilos Recolectados</h6>
                                <!-- Aquí inyectaremos la suma total con JS -->
                                <h2 id="total-kilos">0 <small class="fs-6">kg</small></h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <div class="card bg-info text-white shadow-sm h-100">
                            <div class="card-body text-center">
                                <h6>Total Registros</h6>
                                <!-- Aquí inyectaremos el tamaño del arreglo (length) -->
                                <h2 id="total-registros">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tabla de Datos -->
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0">Historial de Hoy</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-striped table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Supervisor</th>
                                    <th>Sector</th>
                                    <th>Kilos</th>
                                </tr>
                            </thead>
                            
                            <!-- Este tbody es nuestro contenedor vacío. 
                                 Aquí inyectaremos las filas (<tr>) con JavaScript -->
                            <tbody id="tabla-registros">
                                <!-- Las filas aparecerán aquí dinámicamente -->
                            </tbody>
                        
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Aquí conectaremos nuestro archivo de lógica -->
    <script src="/1. Java Script/03-Sistema-Registro/assets/js/app.js"></script>
</body>
</html>
